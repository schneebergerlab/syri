{% set version = "1.8.1" %}
{% set sha256 = "d36f700264e0636d722c783d15e5722792c460235fccb748fbe73c2910a949c8" %}

package:
  name: syri
  version: {{ version }}

source:
  url: https://github.com/schneebergerlab/syri/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv"
  run_exports:
    - {{ pin_subpackage('syri', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("cxx") }}
  host:
    - python >=3.9
    - setuptools
    - numpy >=2.0
    - cython
    - libxcrypt
  run:
    - python >=3.9
    - numpy >=2.0
    - pandas >=1.3
    - scipy >=1.6.2
    - psutil >=5.8
    - igraph >=0.9.1
    - pysam >=0.16.0.1
    - longestrunsubsequence
    - pulp


test:
  commands:
    - syri --version
    - chroder --version

about:
  home: https://github.com/schneebergerlab/syri
  license: MIT License
  license_file: LICENSE
  summary: Synteny and rearrangement identifier between whole-genome assemblies

extra:
  maintainers:
    - mnshgl0110
  skip-lints:
    - compiler_needs_stdlib_c
